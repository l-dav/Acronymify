<!DOCTYPE html>

<html>
	<head>
		<meta charset="utf-8">
		<link rel="stylesheet" href="popup.css"/>
	</head>

	<body>
		<div id="main_page">
			<h1>Acronymify</h1>
			<h2 id="version"></h2>
			<p>
				Get informations about your acronyms.<br>
				Select the word you don't know, then <span id="keyboard_shortcut"></span>
			</p>

			<hr/>

			<input type="text" id="search_word_in_db" placeholder="Search DB">
			<button type="button" id="search_in_db">Search</button>
			<div id="word_definition_search"></div>

			<hr/>
			
			<div>
				<p>Options:</p>
				<input type="checkbox" id="case_sensitive_option" name="case_sensitive">
				<label for="case_sensitive_option">Case sensitive</label>
			</div>
			
			<p>Config:</p>

			<textarea id="local_configuration"></textarea>
			<br>
			<button type="button" id="refresh_local_configuration_button">Update</button>

			<p id="online_db_loading_result"></p>

			<button type="button" id="load_option_page">Open DB</button>

			<hr/>

			<p id="author"></p>
			<p>Contact : <a href="mailto:l.davidovski@technologyandstrategy.com">l.davidovski@technologyandstrategy.com</a></p>

			<p>
				<a id="suggestion_acronym" href="mailto:l.davidovski@technologyandstrategy.com">Suggest new acronyms (mail)</a>
				<a id="url_add" href="http://no_web_site.com" target="_blank" rel="noopener noreferrer">Suggest new acronyms (git)</a>
			</p>

			<p><button type="button" id="reset_params">Reset extension</button></p>
		</div>

		<div id="word_definition"></div>

		<script src="popup.js"></script>
	</body>

</html>
